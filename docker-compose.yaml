# version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    profiles: ["dev"]
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      target: server
    image: myapp-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      VECTOR_DB_DIR: /data
      DOCUMENTS_DIR: /data_and_documents
      OLLAMA_HOST: http://host.docker.internal:11434  # Connect to host's Ollama

    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-data:/data
    tmpfs:
      - /tmp:rw,size=64m
    security_opt:
      - no-new-privileges:true
      - seccomp=./security/seccomp/default.json
    cap_drop:
      - ALL
    pids_limit: 512
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "/app/bin/python",
          "-c",
          "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/health').read()"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    profiles: ["dev"]

  bot:
    build:
      context: .
      target: bot
    env_file:
      - .env
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      API_KEY: "${API_KEY}"
      API_BASE_URL: "http://server:8000"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      RAG_API_URL: "http://server:8000/ask"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      server:
        condition: service_healthy
      db:
        condition: service_healthy
    tmpfs:
      - /tmp:rw,size=64m
    restart: unless-stopped
    profiles: ["dev"]

  client:
    build:
      context: .
      target: client
    image: myapp-client
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: "8501"
      API_KEY: "${API_KEY}"
      API_BASE_URL: http://server:8000
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      server:
        condition: service_healthy
    tmpfs:
      - /tmp:rw,size=64m
    restart: unless-stopped
    profiles: ["dev"]


volumes:
  app-data:
    driver: local
  pg-data:
    driver: local
